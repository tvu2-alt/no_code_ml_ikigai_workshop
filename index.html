<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Il mio modello ML</title>
  <style>
    :root {
      --accent: #00508c;
      --accent-light: #e8f0f7;
      --accent-glow: rgba(0, 80, 140, 0.15);
      --bg: #0f1923;
      --surface: #1a2736;
      --surface2: #223344;
      --text: #e8edf2;
      --text-muted: #7a8fa3;
      --radius: 14px;
      --bar-height: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      gap: 1.2rem;
    }

    header {
      text-align: center;
      width: 100%;
      max-width: 480px;
    }

    header h1 {
      font-size: clamp(1.3rem, 5vw, 1.7rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* ── Webcam card ── */
    #webcam-card {
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
    }

    #webcam-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a111a;
    }

    #webcam-container canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }

    #status-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      transition: background 0.4s;
    }
    #status-dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

    /* ── Start button ── */
    #start-btn {
      width: 100%;
      max-width: 340px;
      padding: 0.85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn:active { transform: scale(0.97); }
    #start-btn:hover  { background: #00407a; }
    #start-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: default; }

    #start-btn svg { flex-shrink: 0; }

    /* ── Predictions ── */
    #label-container {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .prediction-row {
      background: var(--surface);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.04);
      transition: border-color 0.3s;
    }

    .prediction-row.top {
      border-color: rgba(0, 80, 140, 0.6);
      box-shadow: 0 0 0 1px rgba(0,80,140,0.4), 0 4px 16px var(--accent-glow);
    }

    .prediction-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.45rem;
    }

    .class-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .prob-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .prediction-row.top .prob-value { color: #4da6ff; }

    .bar-track {
      height: var(--bar-height);
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #4da6ff);
      transition: width 0.15s ease-out;
      width: 0%;
    }

    .prediction-row.top .bar-fill {
      background: linear-gradient(90deg, #0070c0, #4da6ff);
      box-shadow: 0 0 8px rgba(77,166,255,0.4);
    }

    /* ── Placeholder state ── */
    #placeholder {
      width: 100%;
      max-width: 340px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0.5rem 0;
    }

    footer {
      margin-top: auto;
      font-size: 0.75rem;
      color: #3a4f63;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>Il mio modello ML</h1>
    <p>Addestrato con Google Teachable Machine</p>
  </header>

  <div id="webcam-card">
    <div id="webcam-container">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#2a3f54" stroke-width="1.5" stroke-linecap="round">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
    </div>
    <div id="status-badge">
      <div id="status-dot"></div>
      <span id="status-text">in attesa</span>
    </div>
  </div>

  <div style="display:flex; gap:0.6rem; width:100%; max-width:340px;">
    <button id="start-btn" onclick="init()" style="flex:1;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Avvia la webcam
    </button>
    <button id="stop-btn" onclick="stop()" disabled style="flex:0 0 auto; padding:0.85rem 1.1rem; background:var(--surface2); color:var(--text-muted); border:none; border-radius:var(--radius); font-size:1rem; cursor:default; transition:background 0.2s, color 0.2s; -webkit-tap-highlight-color:transparent;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>
  </div>

  <div id="placeholder">
    <p>Premi il pulsante per avviare la classificazione in tempo reale</p>
  </div>

  <div id="label-container"></div>

  <footer>Ikigai Workshop · ML No-Code</footer>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    // ⬇️  SOSTITUISCI CON IL LINK DEL TUO MODELLO (da Teachable Machine → Esporta → Tensorflow.js → Carica su cloud)
    const URL = "https://teachablemachine.withgoogle.com/models/348tTjKNq/";

    let model, webcam, maxPredictions, running = false;
    const labelContainer = document.getElementById("label-container");
    const placeholder    = document.getElementById("placeholder");
    const btn            = document.getElementById("start-btn");
    const stopBtn        = document.getElementById("stop-btn");
    const statusDot      = document.getElementById("status-dot");
    const statusText     = document.getElementById("status-text");

    async function init() {
      btn.disabled = true;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Caricamento…`;
      statusText.textContent = "caricamento modello";

      try {
        model         = await tmImage.load(URL + "model.json", URL + "metadata.json");
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(340, 340, true);
        await webcam.setup({ facingMode: "user" });
        await webcam.play();

        // Replace placeholder icon with canvas
        const container = document.getElementById("webcam-container");
        container.innerHTML = "";
        container.appendChild(webcam.canvas);

        running = true;
        statusDot.classList.add("live");
        statusText.textContent = "live";
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> In esecuzione`;
        placeholder.style.display = "none";
        stopBtn.disabled = false;
        stopBtn.style.background = "#7f1d1d";
        stopBtn.style.color = "#fca5a5";
        stopBtn.style.cursor = "pointer";

        // Build prediction rows
        for (let i = 0; i < maxPredictions; i++) {
          const row = document.createElement("div");
          row.className = "prediction-row";
          row.innerHTML = `
            <div class="prediction-header">
              <span class="class-name">—</span>
              <span class="prob-value">0%</span>
            </div>
            <div class="bar-track"><div class="bar-fill"></div></div>`;
          labelContainer.appendChild(row);
        }

        window.requestAnimationFrame(loop);
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Riprova`;
        statusText.textContent = "errore — riprova";
      }
    }

    async function loop() {
      if (!running) return;
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    function stop() {
      running = false;
      if (webcam) webcam.stop();
      const container = document.getElementById("webcam-container");
      container.innerHTML = `<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#2a3f54" stroke-width="1.5" stroke-linecap="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`;
      labelContainer.innerHTML = "";
      placeholder.style.display = "";
      statusDot.classList.remove("live");
      statusText.textContent = "in attesa";
      btn.disabled = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Avvia la webcam`;
      stopBtn.disabled = true;
      stopBtn.style.background = "var(--surface2)";
      stopBtn.style.color = "var(--text-muted)";
      stopBtn.style.cursor = "default";
    }

    async function predict() {
      const predictions = await model.predict(webcam.canvas);

      // Find top class index
      let topIdx = 0;
      predictions.forEach((p, i) => { if (p.probability > predictions[topIdx].probability) topIdx = i; });

      const rows = labelContainer.querySelectorAll(".prediction-row");
      predictions.forEach((p, i) => {
        const pct  = (p.probability * 100).toFixed(1);
        const row  = rows[i];
        row.querySelector(".class-name").textContent  = p.className;
        row.querySelector(".prob-value").textContent  = pct + "%";
        row.querySelector(".bar-fill").style.width    = pct + "%";
        row.classList.toggle("top", i === topIdx);
      });
    }
  </script>

</body>
</html>
